{% extends 'base.html' %}

{% block conteudo %}
<!-- Importando a fonte Outfit do Google Fonts para um visual extremamente premium e moderno -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    /* Otimizações drásticas de margem para evitar scroll vertical */
    .navbar {
        margin-bottom: 0.5rem !important; /* Reduz de mb-4 para mb-1 */
    }
    footer {
        margin-top: 0.5rem !important; /* Reduz de mt-4 para mt-1 */
        padding-top: 0.5rem !important;
        padding-bottom: 0.5rem !important;
    }
    
    /* Remove a barra de rolagem lateral (scroll) para telas a partir de 600px de altura */
    @media (min-height: 600px) {
        body {
            overflow: hidden;
        }
    }

    /* Container de login responsivo e enxuto */
    .login-container {
        font-family: 'Outfit', sans-serif;
        min-height: calc(100vh - 150px);
        background: radial-gradient(circle at 10% 20%, rgba(255, 245, 236, 0.6) 0%, rgba(255, 255, 255, 0.4) 90%);
        border-radius: 20px;
    }

    /* Cartão de Login Compacto Premium */
    .premium-card {
        border: 1px solid rgba(230, 126, 34, 0.08);
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(230, 126, 34, 0.05), 
                    0 2px 5px rgba(0, 0, 0, 0.01);
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .premium-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 25px 50px rgba(230, 126, 34, 0.08);
    }

    /* Cabeçalho compacto com gradiente */
    .premium-header {
        background: linear-gradient(135deg, #FF9F43 0%, #E67E22 100%);
        border-radius: 20px 20px 0 0;
        position: relative;
        overflow: hidden;
    }

    .premium-header::after {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
        pointer-events: none;
    }

    /* Inputs ultra-otimizados em altura */
    .premium-input-wrapper {
        position: relative;
    }

    .premium-input-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #A0A5B5;
        transition: all 0.2s ease;
        pointer-events: none;
    }

    .premium-input {
        padding-left: 42px !important;
        padding-top: 10px !important;
        padding-bottom: 10px !important;
        font-size: 0.95rem !important;
        border: 2px solid #F1F3F9 !important;
        background-color: #FAFCFF !important;
        color: #2D3436 !important;
        border-radius: 10px !important;
        transition: all 0.2s ease !important;
    }

    .premium-input:focus {
        border-color: #E67E22 !important;
        background-color: #FFFFFF !important;
        box-shadow: 0 4px 15px rgba(230, 126, 34, 0.08) !important;
    }

    .premium-input:focus + .premium-input-icon {
        color: #E67E22;
    }

    /* Botão Entrar Otimizado (Altura 46px - acima de 44px) */
    .btn-premium-submit {
        background: linear-gradient(135deg, #FF9F43 0%, #D35400 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        font-size: 1rem;
        min-height: 46px;
        box-shadow: 0 6px 12px rgba(230, 126, 34, 0.15);
        transition: all 0.2s ease;
    }

    .btn-premium-submit:hover {
        background: linear-gradient(135deg, #FFA852 0%, #E67E22 100%);
        transform: translateY(-1px);
        box-shadow: 0 10px 18px rgba(230, 126, 34, 0.2);
        color: white;
    }

    /* Botão SSO Otimizado (Altura 46px) */
    .btn-premium-sso {
        background: linear-gradient(135deg, #2D3436 0%, #1E272C 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        font-size: 0.95rem;
        min-height: 46px;
        box-shadow: 0 6px 12px rgba(45, 52, 54, 0.1);
        transition: all 0.2s ease;
    }

    .btn-premium-sso:hover {
        background: linear-gradient(135deg, #3D4446 0%, #2E373C 100%);
        transform: translateY(-1px);
        box-shadow: 0 10px 18px rgba(45, 52, 54, 0.18);
        color: white;
    }
</style>

<div class="row justify-content-center align-items-center login-container px-3">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
        
        <!-- Cartão de Login Compacto Premium -->
        <div class="card premium-card overflow-hidden my-1">
            
            <!-- Cabeçalho Compactado (Menor padding vertical) -->
            <div class="premium-header text-white text-center py-3 px-3">
                <h3 class="fw-bold mb-0 fs-4" style="letter-spacing: -0.5px;">Acessar o HopLife</h3>
                <p class="mb-0 opacity-75 small" style="font-size: 0.8rem;">Seu portal de saúde, metas e conquistas</p>
            </div>
            
            <div class="card-body p-3 p-md-4">
                <!-- Formulário de Login Tradicional -->
                <form method="post" action="#" novalidate>
                    {% csrf_token %}
                    
                    <!-- Campo de Usuário Otimizado -->
                    <div class="mb-2.5">
                        <label for="username" class="form-label small fw-bold text-muted mb-1 text-uppercase" style="letter-spacing: 0.5px; font-size: 0.75rem;">
                            Nome de Usuário
                        </label>
                        <div class="premium-input-wrapper">
                            <input 
                                type="text" 
                                name="username" 
                                id="username" 
                                class="form-control premium-input" 
                                placeholder="Digite seu usuário" 
                                required 
                                aria-required="true"
                            >
                            <!-- Ícone de Usuário -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="premium-input-icon">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                    </div>

                    <!-- Campo de Senha Otimizado -->
                    <div class="mb-3">
                        <label for="password" class="form-label small fw-bold text-muted mb-1 text-uppercase" style="letter-spacing: 0.5px; font-size: 0.75rem;">
                            Senha do Sistema
                        </label>
                        <div class="premium-input-wrapper">
                            <input 
                                type="password" 
                                name="password" 
                                id="password" 
                                class="form-control premium-input" 
                                placeholder="Digite sua senha" 
                                required 
                                aria-required="true"
                            >
                            <!-- Ícone de Cadeado -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="premium-input-icon">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                    </div>

                    <!-- Botão de Entrar Principal -->
                    <div class="d-grid gap-2 mb-2">
                        <button 
                            type="submit" 
                            class="btn btn-premium-submit btn-lg py-1.5 d-flex align-items-center justify-content-center"
                        >
                            Entrar
                        </button>
                    </div>
                </form>

                <!-- Divisor Visual Enxuto -->
                <div class="d-flex align-items-center my-3">
                    <hr class="flex-grow-1 text-muted opacity-25 m-0">
                    <span class="px-3 text-muted fw-bold text-uppercase" style="letter-spacing: 1px; font-size: 9px;">ou continue com</span>
                    <hr class="flex-grow-1 text-muted opacity-25 m-0">
                </div>

                <!-- Botão do Keycloak Otimizado -->
                {% if login_url %}
                <div class="d-grid gap-2">
                    <a 
                        href="{{ login_url }}" 
                        class="btn btn-premium-sso btn-lg py-1.5 d-flex align-items-center justify-content-center"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-shield-lock-fill me-2 text-warning" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M8 0c-.69 0-1.843.265-2.928.56-1.11.3-2.229.655-2.887.87a1.54 1.54 0 0 0-1.044 1.262c-.596 4.477.787 7.795 2.465 9.99 1.679 2.196 3.7 3.014 4.26 3.208a.5.5 0 0 0 .346 0c.56-.194 2.58-.102 4.26-2.208 1.678-2.195 3.061-5.513 2.466-9.99a1.54 1.54 0 0 0-1.044-1.263 68.4 68.4 0 0 0-2.887-.87C9.843.266 8.69 0 8 0m0 5a1.5 1.5 0 0 1 .5 2.915V9a1.5 1.5 0 0 1-3 0V7.915A1.5 1.5 0 0 1 8 5m.5 2.5a.5.5 0 1 0-1 0 .5.5 0 0 0 1 0"/>
                        </svg>
                        Conta Única HopLife
                    </a>
                </div>
                {% endif %}
            </div>
            
            <!-- Link de Ajuda Adicional Compacto -->
            <div class="card-footer bg-light border-0 py-2.5 text-center">
                <a href="#" class="text-decoration-none text-warm fw-semibold small" style="font-size: 0.8rem;">Esqueceu a sua senha?</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
