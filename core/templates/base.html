<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HopLife</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        .bg-warm { background-color: #E67E22 !important; } 
        .text-warm { color: #D35400 !important; }
        .btn-warm { background-color: #E67E22; color: white; border: none; }
        .btn-warm:hover { background-color: #D35400; color: white; }
        .navbar-dark .navbar-nav .nav-link, .navbar-dark .navbar-brand { color: rgba(255, 255, 255, 0.95); }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-warm mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">HopLife</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link" href="{% url 'metas:listar' %}">Minhas Metas</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'metas:listar_categorias' %}">Categorias</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Conquistas</a></li>
                        <li class="nav-item"><a class="nav-link text-warning fw-bold" href="/usuarios/logout/">Sair</a></li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link" href="#">Sobre o HopLife</a></li>
                        <li class="nav-item"><a class="nav-link text-white fw-bold" href="/usuarios/login/">Entrar</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="container flex-grow-1">
        {% block conteudo %}{% endblock %}
    </main>

    <footer class="bg-white border-top text-center py-3 mt-4 text-muted">
        <div class="container">
            <small>&copy; 2026 HopLife - Projeto MDS</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
