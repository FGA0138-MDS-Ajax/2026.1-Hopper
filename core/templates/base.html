{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HopLife Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* --- Cores da Paleta HopLife --- */
        .bg-hop-green { background-color: #3A5A50 !important; } 
        .text-hop-green { color: #3A5A50 !important; }
        .text-escuro { color: #374151 !important; } 

        /* --- Menu Interativo --- */
        .navbar-dark .navbar-nav .menu-link {
            color: #FFFFFF !important;
            font-weight: 700;
            font-size: 1.2rem !important; 
            padding: 0.6rem 1.2rem !important;
            border-radius: 50px;
            background-color: rgba(255, 255, 255, 0.08);
            border: 2px solid transparent; 
            transition: all 0.3s ease;
        }
        .navbar-dark .navbar-nav .menu-link:hover {
            background-color: rgba(255, 255, 255, 0.15); 
            border: 2px solid rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* --- Botão Sair (Efeito 3D) --- */
        .nav-link-sair {
            background-color: #E64500 !important;
            border-radius: 12px !important;
            padding: 0.6rem 1.5rem !important; 
            box-shadow: 0 4px 0 #B33600 !important;
            border: none !important;
        }
        .nav-link-sair:hover {
            transform: translateY(2px) !important; 
            box-shadow: 0 2px 0 #B33600 !important;
        }

        /* --- Classes Globais de Acessibilidade --- */
        
        /* 1. Tamanho da Fonte */
        body.texto-pequeno, body.texto-pequeno p, body.texto-pequeno span, body.texto-pequeno a:not(.menu-link) { 
            font-size: 0.9rem !important; 
        }
        
        body.texto-grande, body.texto-grande p, body.texto-grande span, body.texto-grande a:not(.menu-link) { 
            font-size: 1.35rem !important; 
        }
        body.texto-grande h1 { font-size: 2.8rem !important; }
        body.texto-grande h2 { font-size: 2.4rem !important; }
        body.texto-grande h3 { font-size: 2rem !important; }

        /* 2. Tamanho dos Botões */
        body.botao-largo button,
        body.botao-largo .btn, 
        body.botao-largo [class*="btn-"], 
        body.botao-largo input[type="submit"],
        body.botao-largo .menu-link,
        body.botao-largo .nav-link-sair {
            padding: 1.2rem 2.5rem !important;
            font-size: 1.3rem !important;
            border-width: 3px !important;
        }
        
        /* Exceção: Protege o botão Hoje e os quadradinhos do calendário */
        body.botao-largo .btn-hoje-3d {
            padding: 1rem 2rem !important; 
            width: 80% !important; /* Dá mais espaço horizontal para o texto grande */
            height: auto !important;
        }
        
        /* O :not() impede que a regra esmague o botão de Hoje */
        body.botao-largo button[onclick^="abrirSelecao"]:not(.btn-hoje-3d) {
            width: 55px !important;
            height: 55px !important;
            padding: 0 !important; 
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 texto-{{ global_tamanho_texto|default:'medio' }} botao-{{ global_tamanho_botao|default:'normal' }}" style="background-color: #E0DED7; color: #000000;">

    <nav class="navbar navbar-expand-lg navbar-dark bg-hop-green shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{% static 'img/logo-hoplife.png' %}" alt="Logo HopLife" height="70">
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-2 mt-3 mt-lg-0">
                    
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link menu-link" href="{% url 'metas:listar' %}">Minhas Metas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link menu-link" href="{% url 'usuarios:acessibilidade' %}">Configurações</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link menu-link" href="#">Conquistas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link menu-link nav-link-sair" href="/usuarios/logout/">Sair</a>
                        </li>
                    {% endif %}
                    
                </ul>
            </div>
        </div>
    </nav>

    <main class="container flex-grow-1 mt-4">
        {% block conteudo %}{% endblock %}
    </main>

    <footer class="text-center py-3 mt-4" style="background-color: #E0DED7; color: #6B7280; border-top: 2px solid #FFFFFF;">
        <div class="container">
            <span class="fw-bold fs-6">&copy; 2026 HopLife - Projeto MDS</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
