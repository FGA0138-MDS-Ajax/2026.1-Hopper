<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HopLife</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">HopLife</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Minhas Metas</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Conquistas</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Perfil (Acessibilidade)</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container flex-grow-1">
        {% block conteudo %}
        {% endblock %}
    </main>

    <footer class="bg-white border-top text-center py-3 mt-4 text-muted">
        <div class="container">
            <small>&copy; 2026 HopLife - Projeto MDS</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
