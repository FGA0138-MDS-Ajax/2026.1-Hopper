<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>HopLife - Gestão de Metas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="/">HopLife</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Alternar navegação">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link fs-5" href="#">Minhas Metas</a></li>
                        <li class="nav-item"><a class="nav-link fs-5" href="#">Conquistas</a></li>
                        <li class="nav-item"><a class="nav-link text-warning fw-bold fs-5" href="/usuarios/logout/">Sair</a></li>
        
                    {% else %}
                        <li class="nav-item"><a class="nav-link fs-5" href="#">Sobre o HopLife</a></li>
                        <li class="nav-item"><a class="nav-link text-white fw-bold fs-5" href="/usuarios/login/">Entrar</a></li>
                    {% endif %}
                    
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5 flex-grow-1">
        {% block conteudo %}
        {% endblock %}
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0 fs-5">HopLife &copy; 2026 - Organizando sua vida com facilidade.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
