{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HopLife Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* --- Cores da Paleta HopLife (Alto Contraste) --- */
        .bg-hop-green { background-color: #3A5A50 !important; } 
        .text-hop-green { color: #3A5A50 !important; }
        .bg-warm { background-color: #E64500 !important; } 
        .text-warm { color: #E64500 !important; }
        
        .text-escuro { color: #374151 !important; } 

        /* --- Estilo para botões quentes (laranja) --- */
        .btn-warm {
            background-color: #E64500 !important;
            color: #FFFFFF !important;
            border: none;
        }
        .btn-warm:hover {
            background-color: #CC3D00 !important;
            color: #FFFFFF !important;
        }
        
        /* --- Menu Interativo (Tamanho Gigante, mas com visual App/Premium) --- */
        .navbar-dark .navbar-nav .menu-link {
            color: #FFFFFF !important;
            font-weight: 700;
            font-size: 1.5rem !important; /* Mantido o seu tamanho original */
            padding: 0.8rem 1.8rem !important; /* Área de toque bem generosa */
            border-radius: 50px; /* Formato de pílula arredondada */
            background-color: rgba(255, 255, 255, 0.08); /* Fundo translúcido permanente (efeito vidro) */
            border: 2px solid transparent; 
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); /* Sombrinha leve */
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .navbar-dark .navbar-nav .menu-link:hover {
            background-color: rgba(255, 255, 255, 0.15); 
            border: 2px solid rgba(255, 255, 255, 0.3); /* Borda aparece no hover dando elegância */
            transform: translateY(-4px); /* Pulo para cima */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        /* --- Botão Sair (Gigante, Destacado e com Efeito 3D Físico) --- */
        .nav-link-sair {
            background-color: #E64500 !important;
            color: #FFFFFF !important;
            border-radius: 12px !important; /* Formato que você escolheu */
            padding: 0.8rem 2.2rem !important; 
            /* Efeito de profundidade (3D) no botão */
            box-shadow: 0 6px 0 #B33600, 0 8px 15px rgba(230, 69, 0, 0.4) !important; 
            border: none !important;
            transition: all 0.15s ease-in-out !important;
        }
        .nav-link-sair:hover {
            background-color: #FF5A1A !important;
            /* Simula o botão sendo apertado fisicamente para baixo */
            transform: translateY(4px) !important; 
            box-shadow: 0 2px 0 #B33600, 0 4px 8px rgba(230, 69, 0, 0.4) !important; 
        }

        /* --- Efeito Botão Principal (+ Nova Meta) --- */
        .btn-principal {
            background-color: #3A5A50;
            color: #FFFFFF !important;
            transition: all 0.2s ease-in-out;
        }
        .btn-principal:hover {
            background-color: #2D473F; 
            transform: translateY(-3px); 
            box-shadow: 0 8px 15px rgba(58, 90, 80, 0.4) !important;
        }

        /* --- Efeito Hover nos Cards de Metas --- */
        .goal-card {
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .goal-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1) !important;
        }

        /* --- Efeito Botão Concluir --- */
        .btn-concluir {
            transition: transform 0.2s;
        }
        .btn-concluir:hover {
            transform: scale(1.05); 
        }

        /* --- Efeito Abas de Tempo --- */
        .time-pill {
            color: #374151; 
            font-weight: 700;
            border-radius: 20px;
            transition: background-color 0.2s;
        }
        .time-pill:hover {
            background-color: #D1CFC4;
            color: #E64500 !important;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100" style="background-color: #E0DED7; color: #000000;">

    <nav class="navbar navbar-expand-lg navbar-dark bg-hop-green shadow-sm py-3"> <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{% static 'img/logo-hoplife.png' %}" alt="Logo HopLife" height="70" style="filter: drop-shadow(3px 3px 0px #FFFFFF) drop-shadow(6px 6px 0px rgba(255, 255, 255, 0.5));">
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="box-shadow: none;">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-3 gap-lg-4 mt-4 mt-lg-0 pb-3 pb-lg-0">
                    
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link menu-link" href="#">Minhas Metas</a></li>
                        <li class="nav-item"><a class="nav-link menu-link" href="#">Conquistas</a></li>
                        <li class="nav-item"><a class="nav-link menu-link nav-link-sair" href="/usuarios/logout/">Sair</a></li>
                    {% endif %}
                    
                </ul>
            </div>
        </div>
    </nav>

    <main class="container flex-grow-1 mt-4">
        {% block conteudo %}{% endblock %}
    </main>

    <footer class="text-center py-3 mt-4" style="background-color: #E0DED7; color: #6B7280; border-top: 2px solid #FFFFFF;">
        <div class="container">
            <span class="fw-bold fs-6 text-escuro">&copy; 2026 HopLife - Projeto MDS</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
