{% extends 'base.html' %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm rounded-4 border-0 mt-5">
            <div class="card-body p-5 text-center">
                <div class="mb-4" style="font-size: 4rem;">🗑️</div>
                <h2 class="text-danger fw-bold mb-4">Apagar Categoria</h2>
                
                <p class="fs-4 text-muted mb-4">
                    Tem a certeza de que deseja apagar a categoria <strong style="color: {{ object.cor_identificacao }};">{{ object.nome }}</strong>?
                    <br><small class="text-muted fs-6 mt-2 d-block">As metas que usam esta categoria não serão apagadas, ficarão apenas "Sem categoria".</small>
                </p>
                
                <form method="POST" class="d-grid gap-3 mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-lg py-3 rounded-pill fs-4 shadow-sm">Sim, apagar categoria</button>
                    <a href="{% url 'metas:listar_categorias' %}" class="btn btn-light btn-lg py-3 rounded-pill fs-5">Cancelar e Voltar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
