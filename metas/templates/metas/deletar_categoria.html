{% extends 'base.html' %}

{% block conteudo %}
<style>
    
    /* Botão de Perigo (Ação Destrutiva) */
    .btn-perigo {
        background-color: #DC3545 !important;
        color: #FFFFFF !important;
        border-radius: 12px !important;
        padding: 1rem 2.2rem !important;
        font-weight: 700;
        text-decoration: none !important;
        box-shadow: 0 4px 0 #A71D2A !important; /* Sombrinha 3D */
        border: none !important;
        transition: all 0.15s ease-in-out !important;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        font-size: 1.2rem;
    }
    .btn-perigo:hover {
        background-color: #C82333 !important;
        transform: translateY(2px) !important; /* Afunda pela metade ao passar o mouse */
        box-shadow: 0 2px 0 #A71D2A !important;
        color: #FFFFFF !important;
    }
    .btn-perigo:active {
        transform: translateY(4px) !important; /* Entra pra dentro ao clicar */
        box-shadow: 0 0 0 transparent !important;
    }

    /* Botão Cancelar (Restaurado com o visual 3D bloquinho) */
    .btn-cancelar {
        background-color: #FFFFFF !important;
        color: #374151 !important;
        border-radius: 12px !important;
        padding: 1rem 2.2rem !important;
        font-weight: 700;
        text-decoration: none !important;
        border: 2px solid #E0DED7 !important;
        box-shadow: 0 4px 0 #D1CFC4 !important; /* Sombra 3D cinza restaurada */
        transition: all 0.15s ease-in-out !important;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        font-size: 1.1rem;
        margin-top: 1rem;
    }
    .btn-cancelar:hover {
        background-color: #F9F9F8 !important;
        transform: translateY(2px) !important; /* Afunda pela metade ao passar o mouse */
        box-shadow: 0 2px 0 #D1CFC4 !important;
        color: #343a40 !important;
    }
    .btn-cancelar:active {
        transform: translateY(4px) !important; /* Entra pra dentro ao clicar */
        box-shadow: 0 0 0 transparent !important;
    }
</style>

<div class="row justify-content-center pb-5">
    <div class="col-md-6">
        <div class="card shadow-sm rounded-4 border-0 mt-5" style="background-color: #FFFFFF;">
            <div class="card-body p-5 text-center">
                
                <div class="mb-4" style="font-size: 4rem;">🗑️</div>
                
                <h2 class="fw-bolder mb-4" style="letter-spacing: -0.5px; color: #374151;">Apagar Categoria</h2>
                
                <p class="fs-5 text-muted mb-4">
                    Tem a certeza de que deseja apagar a categoria <strong style="color: {{ object.cor_identificacao }}; font-size: 1.3rem;">{{ object.nome }}</strong>?
                </p>

                <div class="p-3 mb-4 rounded-3 text-start d-inline-block" style="background-color: #F9F9F8; border: 2px solid #E0DED7;">
                    <small class="text-muted fs-6 d-block text-center">
                        <strong>Aviso:</strong> As metas que usam esta categoria não serão apagadas, ficarão apenas como "Sem categoria".
                    </small>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex flex-column mt-4 border-top pt-4">
                        <button type="submit" class="btn-perigo">Sim, apagar categoria</button>
                        <a href="{% url 'metas:listar_categorias' %}" class="btn-cancelar">Cancelar e Voltar</a>
                    </div>
                </form>
                
            </div>
        </div>
    </div>
</div>
{% endblock %}
