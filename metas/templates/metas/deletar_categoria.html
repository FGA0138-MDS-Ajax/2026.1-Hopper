{% extends 'base.html' %}

{% block conteudo %}
<style>
    /* --- Botão de Perigo 3D (Apagar) --- */
    .btn-perigo-3d {
        background-color: #DC3545 !important;
        color: #FFFFFF !important;
        border-radius: 12px !important;
        padding: 1rem 2.2rem !important;
        font-weight: 700;
        text-decoration: none !important;
        box-shadow: 0 6px 0 #A71D2A, 0 8px 15px rgba(220, 53, 69, 0.3) !important;
        border: none !important;
        transition: all 0.15s ease-in-out !important;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        font-size: 1.2rem;
    }
    .btn-perigo-3d:hover {
        background-color: #C82333 !important;
        transform: translateY(4px) !important; /* Efeito de afundar */
        box-shadow: 0 2px 0 #A71D2A, 0 4px 8px rgba(220, 53, 69, 0.3) !important;
        color: #FFFFFF !important;
    }

    /* --- Botão Secundário 3D (Cancelar) --- */
    .btn-secundario-3d {
        background-color: #FFFFFF !important;
        color: #374151 !important;
        border-radius: 12px !important;
        padding: 1rem 2.2rem !important;
        font-weight: 700;
        text-decoration: none !important;
        border: 2px solid #E0DED7 !important;
        box-shadow: 0 6px 0 #D1CFC4, 0 8px 15px rgba(0, 0, 0, 0.05) !important;
        transition: all 0.15s ease-in-out !important;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        font-size: 1.1rem;
    }
    .btn-secundario-3d:hover {
        background-color: #F9F9F8 !important;
        transform: translateY(4px) !important; /* Efeito de afundar */
        box-shadow: 0 2px 0 #D1CFC4, 0 4px 8px rgba(0, 0, 0, 0.05) !important;
    }
</style>

<div class="row justify-content-center pb-5">
    <div class="col-md-6">
        <div class="card shadow-sm rounded-4 border-0 mt-5" style="background-color: #FFFFFF;">
            <div class="card-body p-5 text-center">
                
                <div class="mb-4" style="font-size: 4rem;">🗑️</div>
                
                <h2 class="text-escuro fw-bolder mb-4" style="letter-spacing: -0.5px;">Apagar Categoria</h2>
                
                <p class="fs-5 text-muted mb-4">
                    Tem a certeza de que deseja apagar a categoria <strong style="color: {{ object.cor_identificacao }}; font-size: 1.3rem;">{{ object.nome }}</strong>?
                </p>

                <div class="p-3 mb-4 rounded-3 text-start d-inline-block" style="background-color: #F9F9F8; border: 1px solid #E0DED7;">
                    <small class="text-muted fs-6 d-block text-center">
                        <strong>Aviso:</strong> As metas que usam esta categoria não serão apagadas, ficarão apenas como "Sem categoria".
                    </small>
                </div>
                
                <form method="POST" class="d-flex flex-column gap-3 mt-2">
                    {% csrf_token %}
                    <button type="submit" class="btn-perigo-3d">Sim, apagar categoria</button>
                    <a href="{% url 'metas:listar_categorias' %}" class="btn-secundario-3d">Cancelar e Voltar</a>
                </form>
                
            </div>
        </div>
    </div>
</div>
{% endblock %}
