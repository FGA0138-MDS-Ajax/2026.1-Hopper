{% extends 'base.html' %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-warm fw-bold m-0">Minhas Categorias</h2>
            <a href="{% url 'metas:criar_categoria' %}" class="btn btn-warm shadow-sm">➕ Nova</a>
        </div>

        <div class="card shadow-sm rounded-4 border-0">
            <div class="card-body p-4">
                {% for categoria in categorias %}
                    <div class="d-flex justify-content-between align-items-center border-bottom py-3">
                        <div class="d-flex align-items-center gap-3">
                            <div style="width: 25px; height: 25px; background-color: {{ categoria.cor_identificacao }}; border-radius: 5px;"></div>
                            <span class="fs-5">{{ categoria.nome }}</span>
                        </div>
                        <a href="{% url 'metas:deletar_categoria' categoria.id %}" class="btn btn-sm btn-outline-danger px-3">Apagar</a>
                    </div>
                {% empty %}
                    <p class="text-center text-muted m-0 py-3">Você ainda não tem categorias personalizadas.</p>
                {% endfor %}
                
                <div class="mt-4 text-center">
                    <a href="{% url 'metas:listar' %}" class="btn btn-light rounded-pill px-4">Voltar para Metas</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
