{% extends 'base.html' %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm rounded-4 border-0 mt-4">
            <div class="card-body p-5">
                <h2 class="text-warm fw-bold mb-4 text-center">Criar Nova Meta</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-4">
                            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
                            {{ field }}
                            
                            {% if field.name == 'categoria' %}
                                <div class="text-end mt-1">
                                    <a href="{% url 'metas:criar_categoria' %}" class="text-warm text-decoration-none fw-bold">
                                        + Criar nova categoria
                                    </a>
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-warm btn-lg py-3 rounded-pill fs-4 shadow-sm">Salvar Meta</button>
                        <a href="{% url 'metas:listar' %}" class="btn btn-light btn-lg rounded-pill mt-2">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    input, select {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ced4da;
        border-radius: 10px;
        font-size: 1.1rem;
    }
    input:focus, select:focus {
        border-color: #E67E22;
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(230, 126, 34, 0.25);
    }
</style>
{% endblock %}
